###
### mkdocs-theme.yml
###
copyright:
  '©2026 Nir Geier<br/><a href="https://visitor-badge.laobi.icu/badge?page_id=nirgeier" target="_blank" rel="noopener"><img
  src="https://visitor-badge.laobi.icu/badge?page_id=nirgeier" alt="Visitor Badge"></a>'
theme:
  name: material
  custom_dir: .mkdocs-build/overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - content.footer.last-updated
    - content.footer.contributors
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    #- navigation.prune        # Disabled - hides sections when tabs are off
    - navigation.sections
    #- navigation.tabs          # Disabled - left nav only
    #- navigation.tabs.sticky   # Disabled - left nav only
    #- navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate # Disabled - replaces full nav with per-page TOC in sidebar
    - toc.sticky

    #- header.autohide  # Disabled to keep top nav always visible

  # 👈 enables avatar display
  palette:
    # Dark mode only
    - scheme: slate
      primary: indigo # You can choose any color here

  font:
    text: Mulish
    code: JetBrains Mono
  favicon: assets/favicon.png
  icon:
    logo: logo
    repo: fontawesome/brands/github
    admonition:
      note: material/lightbulb
